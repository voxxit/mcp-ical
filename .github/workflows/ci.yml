name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Cloudflare Worker types
        run: npx wrangler types

      - name: Run type checking for MCP server
        run: npx tsc --noEmit

      - name: Run type checking for Cloudflare Workers
        run: npx tsc --project tsconfig.worker.json --noEmit

      - name: Run linting
        run: npx eslint .

      - name: Run tests with coverage
        run: npx jest --coverage --ci --bail --runInBand

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ always() && (hashFiles('coverage/lcov.info') != '') }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: ./coverage/lcov.info
